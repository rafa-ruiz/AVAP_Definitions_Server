name: AVAP Definition Engine CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Servicio de Base de Datos para los tests de integración
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: avap_user
          POSTGRES_PASSWORD: avap_password
          POSTGRES_DB: avap_db
        ports:
          - 5432:5432
        # Healthcheck crítico: Espera a que PostgreSQL acepte conexiones
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # 1. Descargar Código
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Configurar Entorno Node.js (Servidor)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 3. Configurar Entorno Python (Cliente de Test)
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 4. Instalar Dependencias (Ambos lados)
    - name: Install Dependencies
      run: |
        npm ci
        pip install grpcio grpcio-tools requests

    # 5. Inicializar Base de Datos
    # Usamos el cliente psql preinstalado en el runner para inyectar el esquema
    - name: Initialize Database
      env:
        PGPASSWORD: avap_password
      run: |
        psql -h localhost -U avap_user -d avap_db -f init.sql

    # 6. Arrancar el Servidor Node.js
    # Lo ejecutamos en background (&) y esperamos un poco para asegurar que sube
    - name: Start AVAP Engine
      env:
        DATABASE_URL: postgres://avap_user:avap_password@localhost:5432/avap_db
        API_KEY: avap_secret_key_2026
        PORT: 50051
      run: |
        node src/server.js &
        echo "⏳ Waiting for server to launch..."
        sleep 5

    # 7. Compilar Protos para Python (CRÍTICO)
    # Generamos el código Python al vuelo y aplicamos el parche del import relativo
    - name: Compile Python Client Protos
      run: |
        python -m grpc_tools.protoc -I. --python_out=app/core --grpc_python_out=app/core avap.proto
        # Hack para arreglar el import relativo en Python generado
        sed -i 's/import avap_pb2 as avap__pb2/from . import avap_pb2 as avap__pb2/' app/core/avap_pb2_grpc.py

    # 8. Test Funcional (Integridad)
    # Verifica que el servidor responde correctamente a peticiones básicas
    - name: 🧪 Run Integration Test
      run: python tests/test_brain.py

    # 9. Test de Rendimiento (Velocidad)
    # Verifica que el throughput sea aceptable (aunque sea más bajo en CI que en local)
    - name: 🔥 Run Performance Benchmark
      run: python tests/benchmark_brain.py