syntax = "proto3";

package avap;

service DefinitionEngine {
  // Obtiene un solo comando (Legacy / Debug)
  rpc GetCommand (CommandRequest) returns (CommandResponse);
  
  // NUEVO: Descarga el cerebro entero de una vez
  rpc SyncCatalog (Empty) returns (CatalogResponse);
}

// Mensaje vacío para pedir todo sin parámetros
message Empty {}

message CommandRequest {
  string name = 1;
}

message CommandResponse {
  string name = 1;
  string type = 2;
  string interface_json = 3;
  string code = 4;
  string hash = 5;
}

// La lista completa para la replicación
message CatalogResponse {
  repeated CommandResponse commands = 1;
  int32 total_count = 2;
  string version_hash = 3;
}